  run-tests:
    runs-on: ubuntu-20.04
    env:
      MAVEN_SKIP_TESTS: false
      CONTAINER_NAME_SPANNER: ubuntu20-spanner
      CONTAINER_NAME_CB: ubuntu20-couchbase
      CONTAINER_NAME_LDAP: ubuntu20-ldap
      CONTAINER_NAME_MYSQL: ubuntu20-mysql
      CONTAINER_NAME_POSTGRESQL: ubuntu20-postgresql
      DEVELOPMENT_BUILD: true
      SKIP_FINDBUGS: true
      DEPENDENCY_CHECK: true
      VERSION_NAME: main
      PROFILE_NAME: default
    strategy:
      max-parallel: 1
      matrix:
        persistence:
          # - "LDAP"
          # - "MYSQL"
          - "PGSQL"
          # - "COUCHBASE"
          # - "SPANNER"
        # service:
        #   - "jans-bom"
        #   - "jans-orm"
        #   - "jans-core"
        #   - "jans-lock/lock-master"
        #   - "agama"
        #   - "jans-auth"
        #   - "jans-link"
        #   - "jans-fido2"
        #   - "jans-scim"
        #   - "jans-keycloak-link"
        #   - "jans-config-api"
        #   - "jans-keycloak-integration"
        #   - "jans-casa"
      fail-fast: false
    steps:

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch }}

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'adopt'

    - name: Set up Maven
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'adopt'
        cache: 'maven'

    - name: Run Jans Monolith
      env:
        JANS_FQDN: demoexample.jans.io
        EXT_IP: $(ifconfig eth0 | grep -Eo 'inet (addr:)?([0-9]*\.){3}[0-9]*' | grep -Eo '([0-9]*\.){3}[0-9]*' | grep -v '127.0.0.1')
        JANS_BUILD_COMMIT: main
      run: |
        export ip=$(ifconfig eth0 | grep -Eo 'inet (addr:)?([0-9]*\.){3}[0-9]*' | grep -Eo '([0-9]*\.){3}[0-9]*' | grep -v '127.0.0.1')
        sudo chmod a+x automation/startjanssenmonolithdemo.sh
        sudo RUN_TESTS=true bash ./automation/startjanssenmonolithdemo.sh "demoexample.jans.io" "${{ matrix.persistence }}" "$ip" "${{ github.sha }}"

    # - name: List Reports
    #   run: |
    #     ls /tmp/reports/

    # - name: Upload Test Results
    #   uses: actions/upload-artifact@v4
    #   with:
    #     name: ${{ matrix.persistence }}-test-results
    #     path: /tmp/reports

    # - name: Download Test Results Artifact
    #   uses: actions/download-artifact@v4
    #   with:
    #     name: ${{ matrix.persistence }}-test-results
    #     path: ${{ matrix.persistence }}-test-results

    # - name: List Downloaded Files
    #   run: |
    #     echo "Files in the downloaded artifact directory:"
    #     ls -al ${{ matrix.persistence }}-test-results
    #     pwd

    # - name: Publish Test Results
    #   uses: EnricoMi/publish-unit-test-result-action@v2
    #   if: always()
    #   with:
    #     files: |
    #       '${{ matrix.persistence }}-*/**/*.xml'
    #       '${{ matrix.persistence }}-*/*.xml'
    - name: Publish Test Results
      continue-on-error: true
      uses: EnricoMi/publish-unit-test-result-action@e780361cd1fc1b1a170624547b3ffda64787d365 # v2.12.0
      with:
        large_files: true
        check_name: Java ${{ matrix.persistence }} Tests
        report_individual_runs: "true"
        files: |
          /${{ matrix.persistence }}-reports/*.xml

    - name: Upload Test Results
      continue-on-error: true
      if: always()
      uses: actions/upload-artifact@26f96dfa697d77e81fd5907df203aa23a56210a8 # v4.3.0
      with:
        name: java-${{ matrix.persistence }}-test-results
        path: "/${{ matrix.persistence }}-reports/*.xml"

    - uses: dorny/test-reporter@31a54ee7ebcacc03a09ea97a7e5465a47b84aea5 # v1
      continue-on-error: true
      with:
        name: Java ${{ matrix.persistence-backends }} Tests
        path: '${{ matrix.persistence-backends }}report.xml'
        reporter: java-junit

    - name: Download Artifacts
      uses: actions/download-artifact@6b208ae046db98c579e8a3aa621ab581ff575935 # v4.1.1
      with:
        name: java-${{ matrix.persistence }}-test-results
        path: java-${{ matrix.persistence }}-test-results

    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action/composite@e780361cd1fc1b1a170624547b3ffda64787d365 # v2.12.0
      with:
        files: "java-${{ matrix.persistence}}-test-results/**/*.xml"
